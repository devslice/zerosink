version: "3"

services:
  zerosink:
    build: .
    container_name: zerosink
    restart: unless-stopped
    ports:
      # Bind DNS UDP/TCP to host port 53 (requires root/sudo on host to run)
      - "53:53/udp"
      - "53:53/tcp"
      # Bind Dashboard to host port 80
      - "80:80/tcp"
    volumes:
      # Mount host data folder for SQLite persistent database
      - ./data:/app/data
    environment:
      # Upstream resolver for non-blocked DNS queries
      - ZEROSINK_UPSTREAM_DNS=1.1.1.1


